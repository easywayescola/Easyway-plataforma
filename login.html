<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EasyWay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #3B7FD8; --secondary: #E63946; --dark: #2C3E50; --light: #F7F9FC; --accent: #FFD60A; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .login-container { background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
        .login-left { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 3rem 2rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .login-left img { height: 80px; margin-bottom: 1.5rem; }
        .login-left h1 { font-size: 2rem; margin-bottom: 1rem; }
        .login-left p { font-size: 1.1rem; opacity: 0.95; line-height: 1.6; }
        .login-right { padding: 3rem 2rem; display: flex; flex-direction: column; justify-content: center; }
        .login-right h2 { color: var(--primary); margin-bottom: 2rem; text-align: center; }
        .login-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
        .login-tab { flex: 1; padding: 1rem; text-align: center; cursor: pointer; border: none; background: none; font-size: 1rem; font-weight: 600; color: #999; transition: all 0.3s; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .login-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .login-content { display: none; }
        .login-content.active { display: block; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--dark); }
        .form-group input { width: 100%; padding: 0.75rem; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .remember-forgot a { color: var(--primary); text-decoration: none; }
        .checkbox { display: flex; align-items: center; gap: 0.5rem; }
        .login-btn { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-bottom: 1rem; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59,127,216,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-message { color: #E63946; font-size: 0.9rem; margin-bottom: 1rem; padding: 0.75rem; background-color: #ffe0e0; border-radius: 8px; display: none; }
        .error-message.show { display: block; }
        .success-message { color: #22c55e; font-size: 0.9rem; margin-bottom: 1rem; padding: 0.75rem; background-color: #e0ffe0; border-radius: 8px; display: none; }
        .success-message.show { display: block; }
        .signup-link { text-align: center; color: #666; font-size: 0.9rem; }
        .signup-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-link { text-align: center; margin-top: 1rem; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        @media (max-width: 768px) { .login-container { grid-template-columns: 1fr; } .login-left { padding: 2rem 1.5rem; } .login-right { padding: 2rem 1.5rem; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <img src="public/logo-official.png" alt="EasyWay Logo">
            <h1>Bem-vindo à EasyWay!</h1>
            <p>Inglês para Crianças e Adolescentes com Gamificação e Diversão</p>
            <p style="margin-top:1.5rem;font-size:1rem;">"Looking forward to the future with complete confidence"</p>
        </div>
        <div class="login-right">
            <h2>Faça Login</h2>
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('student', this)">👨‍🎓 Aluno</button>
                <button class="login-tab" onclick="switchTab('teacher', this)">👨‍🏫 Professor</button>
            </div>
            <div id="student" class="login-content active">
                <div id="studentError" class="error-message"></div>
                <div id="studentSuccess" class="success-message"></div>
                <div class="form-group"><label>Email</label><input type="email" id="studentEmail" placeholder="seu.email@example.com"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="studentPassword" placeholder="Sua senha"></div>
                <div class="remember-forgot"><label class="checkbox"><input type="checkbox"><span>Lembrar-me</span></label><a href="#">Esqueceu a senha?</a></div>
                <button class="login-btn" id="studentLoginBtn" onclick="loginStudent()">Entrar como Aluno</button>
                <div class="signup-link">Não tem conta? <a href="#" onclick="alert('Entre em contato com seu professor para criar uma conta')">Solicite acesso</a></div>
            </div>
            <div id="teacher" class="login-content">
                <div id="teacherError" class="error-message"></div>
                <div id="teacherSuccess" class="success-message"></div>
                <div class="form-group"><label>Email</label><input type="email" id="teacherEmail" placeholder="professor@easyway.com"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="teacherPassword" placeholder="Sua senha"></div>
                <div class="remember-forgot"><label class="checkbox"><input type="checkbox"><span>Lembrar-me</span></label><a href="#">Esqueceu a senha?</a></div>
                <button class="login-btn" id="teacherLoginBtn" onclick="loginTeacher()">Entrar como Professor</button>
                <div class="signup-link">Problemas para acessar? <a href="https://wa.me/5527998552277" target="_blank">Fale conosco</a></div>
            </div>
            <div class="back-link"><a href="index.html">← Voltar ao Início</a></div>
        </div>
    </div>
    <script>
        const API = 'https://easyway-backend-production-4094.up.railway.app/api';
        function switchTab(tab, btn) {
            document.querySelectorAll('.login-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.login-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            btn.classList.add('active');
        }
        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        async function loginStudent() {
            const email = document.getElementById('studentEmail').value;
            const password = document.getElementById('studentPassword').value;
            if (!email || !password) return showError('studentError', 'Preencha email e senha.');
            const btn = document.getElementById('studentLoginBtn');
            btn.disabled = true; btn.textContent = 'Entrando...';
            try {
                const r = await fetch(API+'/auth/student/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
                const data = await r.json();
                if (!r.ok) { showError('studentError', data.error || 'Credenciais inválidas.'); btn.disabled=false; btn.textContent='Entrar como Aluno'; return; }
                localStorage.setItem('token', data.token);
                localStorage.setItem('userType', 'student');
                localStorage.setItem('userName', data.name || '');
                localStorage.setItem('studentLevel', data.level || 'A1');
                document.getElementById('studentSuccess').textContent='Login realizado! Redirecionando...';
                document.getElementById('studentSuccess').classList.add('show');
                setTimeout(() => window.location.href='student-dashboard.html', 1200);
            } catch(e) { showError('studentError','Erro de conexão. Verifique se o servidor está disponível.'); btn.disabled=false; btn.textContent='Entrar como Aluno'; }
        }
        async function loginTeacher() {
            const email = document.getElementById('teacherEmail').value;
            const password = document.getElementById('teacherPassword').value;
            if (!email || !password) return showError('teacherError', 'Preencha email e senha.');
            const btn = document.getElementById('teacherLoginBtn');
            btn.disabled = true; btn.textContent = 'Entrando...';
            try {
                const r = await fetch(API+'/auth/teacher/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
                const data = await r.json();
                if (!r.ok) { showError('teacherError', data.error || 'Credenciais inválidas.'); btn.disabled=false; btn.textContent='Entrar como Professor'; return; }
                localStorage.setItem('token', data.token);
                localStorage.setItem('userType', 'teacher');
                localStorage.setItem('userName', data.name || '');
                document.getElementById('teacherSuccess').textContent='Login realizado! Redirecionando...';
                document.getElementById('teacherSuccess').classList.add('show');
                setTimeout(() => window.location.href='teacher-dashboard.html', 1200);
            } catch(e) { showError('teacherError','Erro de conexão. Verifique se o servidor está disponível.'); btn.disabled=false; btn.textContent='Entrar como Professor'; }
        }
        // auto-redirect removed
            const token = localStorage.getItem('token');
            const userType = localStorage.getItem('userType');
            if (token && userType && token.length > 20) {
                window.location.href = userType === 'teacher' ? 'teacher-dashboard.html' : 'student-dashboard.html';
            }
        });
    </script>
</body>
</html>
