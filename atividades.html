<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyWay - Atividades</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--navy:#001A33;--blue:#29B6F6;--gold:#FFB300;--green:#26C281;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:#F4F7FA;min-height:100vh;color:var(--navy);}
  .topbar{background:var(--navy);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
  .topbar-logo{font-size:1.6rem;font-weight:900;color:white;}
  .topbar-logo span{color:var(--gold);}
  .main{max-width:900px;margin:0 auto;padding:2rem 1.5rem;}
  h1{font-size:1.8rem;margin-bottom:0.5rem;}
  .subtitle{color:#888;margin-bottom:2rem;}
  .section{margin-bottom:2.5rem;}
  .section-title{font-size:1.1rem;font-weight:900;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:3px solid var(--blue);}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
  .card{background:white;border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,26,51,0.08);text-decoration:none;color:var(--navy);transition:all 0.2s;display:flex;flex-direction:column;gap:0.5rem;border-left:4px solid var(--blue);}
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,26,51,0.15);}
  .card-unit{font-size:0.75rem;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;}
  .card-title{font-size:1rem;font-weight:800;}
  .badge{font-size:0.8rem;font-weight:700;color:white;padding:0.2rem 0.6rem;border-radius:50px;align-self:flex-start;}
  .a1{background:var(--blue);}
  .a2{background:var(--green);}
  .arrow{color:var(--blue);font-size:1.2rem;margin-top:0.3rem;}
  .card-a2 .card-unit{color:var(--green);}
  .card-a2{border-left-color:var(--green);}
  .card-a2 .arrow{color:var(--green);}
  @media(max-width:600px){.main{padding:1rem;}.cards{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">Easy<span>Way</span></div>
  <a href="https://easywayidiomas.com" style="color:rgba(255,255,255,0.7);text-decoration:none;font-weight:700;font-size:0.9rem;">&larr; Inicio</a>
</div>
<div class="main">
  <h1>Atividades</h1>
  <p class="subtitle">Escolha seu nível e comece a praticar!</p>
  <div class="section">
    <div class="section-title">Beginner A1</div>
    <div class="cards">
      <a href="index-a1.html" class="card">
        <div class="card-unit">Level A1</div>
        <div class="card-title">Beginner A1</div>
        <div class="badge a1">A1</div><div class="arrow">&#8594;</div>
      </a>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Elementary A2</div>
    <div class="cards">
      <a href="index-a2.html" class="card card-a2">
        <div class="card-unit">Level A2</div>
        <div class="card-title">Elementary A2</div>
        <div class="badge a2">A2</div><div class="arrow">&#8594;</div>
      </a>
    </div>
  </div>
</div>
</body>
</html>
