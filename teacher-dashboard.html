<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Professor - EasyWay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 { font-size: 28px; }
        header .user-info { text-align: right; }
        header .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover { background: #764ba2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .students-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .students-table th {
            background: #f0f0f0;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
        }
        
        .students-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .students-table tr:hover { background: #f9f9f9; }
        
        .action-btn {
            padding: 6px 12px;
            margin-right: 5px;
            font-size: 12px;
        }
        
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }
        
        .edit-btn { background: #3498db; }
        .edit-btn:hover { background: #2980b9; }
        
        .success-msg, .error-msg {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        
        .success-msg {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .success-msg.show, .error-msg.show { display: block; }
        
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .report-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .report-card h3 { color: #333; margin-bottom: 10px; }
        .report-card p { color: #666; margin: 5px 0; }
        
        .grade-input { width: 80px; }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        
        .modal.show { display: block; }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover { color: black; }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📚 Dashboard do Professor</h1>
            </div>
            <div class="user-info">
                <p>Bem-vindo, <strong id="teacherName">Professor</strong>!</p>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('students', this)">👥 Meus Alunos</button>
            <button class="tab-btn" onclick="switchTab('register', this)">➕ Cadastrar Aluno</button>
            <button class="tab-btn" onclick="switchTab('grades', this)">📊 Notas</button>
            <button class="tab-btn" onclick="switchTab('reports', this)">📈 Relatórios</button>
        </div>

        <!-- Aba: Meus Alunos -->
        <div id="students" class="tab-content active">
            <div class="card">
                <h2>Meus Alunos</h2>
                <div id="studentsList"></div>
            </div>
        </div>

        <!-- Aba: Cadastrar Aluno -->
        <div id="register" class="tab-content">
            <div class="card">
                <h2>Cadastrar Novo Aluno</h2>
                <div id="registerSuccess" class="success-msg"></div>
                <div id="registerError" class="error-msg"></div>
                
                <form onsubmit="registerStudent(event)">
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="studentName">Nome do Aluno *</label>
                            <input type="text" id="studentName" required>
                        </div>
                        <div class="form-group">
                            <label for="studentEmail">Email *</label>
                            <input type="email" id="studentEmail" required>
                        </div>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="studentPassword">Senha *</label>
                            <input type="password" id="studentPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="studentLevel">Nível *</label>
                            <select id="studentLevel" required>
                                <option value="">Selecione um nível</option>
                                <option value="A1">A1 - Iniciante</option>
                                <option value="A2">A2 - Elementar</option>
                                <option value="B1">B1 - Intermediário</option>
                                <option value="B2">B2 - Avançado</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="studentPhone">Telefone</label>
                        <input type="tel" id="studentPhone">
                    </div>
                    
                    <button type="submit">Cadastrar Aluno</button>
                </form>
            </div>
        </div>

        <!-- Aba: Notas -->
        <div id="grades" class="tab-content">
            <div class="card">
                <h2>Gerenciar Notas dos Alunos</h2>
                <div id="gradesSuccess" class="success-msg"></div>
                <div id="gradesError" class="error-msg"></div>
                
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>Aluno</th>
                            <th>Nível</th>
                            <th>Nota (0-10)</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="gradesTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Aba: Relatórios -->
        <div id="reports" class="tab-content">
            <div class="card">
                <h2>Relatórios de Progresso</h2>
                <div id="reportsList"></div>
            </div>
        </div>
    </div>

    <!-- Modal para editar aluno -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Editar Aluno</h2>
            <div id="editError" class="error-msg"></div>
            
            <form onsubmit="updateStudent(event)">
                <input type="hidden" id="editStudentId">
                
                <div class="form-group">
                    <label for="editStudentName">Nome</label>
                    <input type="text" id="editStudentName" required>
                </div>
                
                <div class="form-group">
                    <label for="editStudentLevel">Nível</label>
                    <select id="editStudentLevel" required>
                        <option value="A1">A1 - Iniciante</option>
                        <option value="A2">A2 - Elementar</option>
                        <option value="B1">B1 - Intermediário</option>
                        <option value="B2">B2 - Avançado</option>
                    </select>
                </div>
                
                <button type="submit">Atualizar</button>
            </form>
        </div>
    </div>

    <script>
        const API = 'https://3000-iw71hpqw1lykw5v0yjdpa-15663d80.us1.manus.computer/api';
        let students = [];
        let grades = {};

        // Verificar autenticação
        window.addEventListener('load', () => {
            const userType = localStorage.getItem('userType');
            const token = localStorage.getItem('token');
            
            if (userType !== 'teacher' || !token) {
                window.location.href = 'login.html';
                return;
            }
            
            const teacherName = localStorage.getItem('userName') || 'Professor';
            document.getElementById('teacherName').textContent = teacherName;
            
            loadStudents();
            loadGrades();
        });

        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            btn.classList.add('active');
        }

        async function loadStudents() {
            try {
                const r = await fetch(API + '/teachers/' + (localStorage.getItem('teacherId') || '1') + '/students');
                const data = await r.json();
                students = data.students || [];
                displayStudents();
                displayGradesTable();
            } catch(e) {
                console.error('Erro ao carregar alunos:', e);
            }
        }

        function displayStudents() {
            const list = document.getElementById('studentsList');
            if (students.length === 0) {
                list.innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">Nenhum aluno cadastrado ainda.</p>';
                return;
            }
            
            list.innerHTML = `
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Nível</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${students.map(s => `
                            <tr>
                                <td>${s.name}</td>
                                <td>${s.email}</td>
                                <td>${s.level || 'A1'}</td>
                                <td>
                                    <button class="action-btn edit-btn" onclick="openEditModal(${s.id}, '${s.name}', '${s.level || 'A1'}')">Editar</button>
                                    <button class="action-btn delete-btn" onclick="deleteStudent(${s.id})">Deletar</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function displayGradesTable() {
            const table = document.getElementById('gradesTable');
            table.innerHTML = students.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.level || 'A1'}</td>
                    <td>
                        <input type="number" class="grade-input" id="grade-${s.id}" min="0" max="10" 
                               value="${grades[s.id] || ''}" placeholder="0-10">
                    </td>
                    <td>
                        <button class="action-btn" onclick="saveGrade(${s.id})">Salvar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function registerStudent(event) {
            event.preventDefault();
            
            const name = document.getElementById('studentName').value;
            const email = document.getElementById('studentEmail').value;
            const password = document.getElementById('studentPassword').value;
            const level = document.getElementById('studentLevel').value;
            
            try {
                const r = await fetch(API + '/students/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name, email, password, level,
                        teacher_id: localStorage.getItem('teacherId') || 1
                    })
                });
                
                const data = await r.json();
                
                if (r.ok) {
                    document.getElementById('registerSuccess').textContent = '✅ Aluno cadastrado com sucesso!';
                    document.getElementById('registerSuccess').classList.add('show');
                    document.querySelector('form').reset();
                    setTimeout(() => {
                        document.getElementById('registerSuccess').classList.remove('show');
                        loadStudents();
                    }, 2000);
                } else {
                    throw new Error(data.error || 'Erro ao cadastrar');
                }
            } catch(e) {
                document.getElementById('registerError').textContent = '❌ ' + e.message;
                document.getElementById('registerError').classList.add('show');
            }
        }

        function openEditModal(id, name, level) {
            document.getElementById('editStudentId').value = id;
            document.getElementById('editStudentName').value = name;
            document.getElementById('editStudentLevel').value = level;
            document.getElementById('editModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        async function updateStudent(event) {
            event.preventDefault();
            // Implementar atualização de aluno
            alert('Funcionalidade em desenvolvimento');
            closeModal();
        }

        async function deleteStudent(id) {
            if (!confirm('Tem certeza que deseja deletar este aluno?')) return;
            
            try {
                // Implementar deleção
                alert('Funcionalidade em desenvolvimento');
                loadStudents();
            } catch(e) {
                alert('Erro ao deletar aluno');
            }
        }

        async function saveGrade(studentId) {
            const gradeValue = document.getElementById('grade-' + studentId).value;
            
            if (!gradeValue || gradeValue < 0 || gradeValue > 10) {
                alert('Digite uma nota válida (0-10)');
                return;
            }
            
            grades[studentId] = gradeValue;
            document.getElementById('gradesSuccess').textContent = '✅ Nota salva com sucesso!';
            document.getElementById('gradesSuccess').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('gradesSuccess').classList.remove('show');
            }, 2000);
        }

        function loadGrades() {
            // Carregar notas do localStorage
            const savedGrades = localStorage.getItem('grades');
            if (savedGrades) {
                grades = JSON.parse(savedGrades);
            }
        }

        function displayReports() {
            const list = document.getElementById('reportsList');
            
            if (students.length === 0) {
                list.innerHTML = '<p style="color: #999;">Nenhum aluno para gerar relatórios.</p>';
                return;
            }
            
            list.innerHTML = students.map(s => `
                <div class="report-card">
                    <h3>📊 ${s.name}</h3>
                    <p><strong>Email:</strong> ${s.email}</p>
                    <p><strong>Nível:</strong> ${s.level || 'A1'}</p>
                    <p><strong>Nota:</strong> ${grades[s.id] ? grades[s.id] + '/10' : 'Sem nota'}</p>
                    <p><strong>Status:</strong> ${grades[s.id] >= 7 ? '✅ Aprovado' : grades[s.id] ? '⚠️ Em desenvolvimento' : '📝 Sem avaliação'}</p>
                </div>
            `).join('');
        }

        // Atualizar relatórios quando mudar de aba
        const originalSwitchTab = switchTab;
        window.switchTab = function(tabName, btn) {
            originalSwitchTab(tabName, btn);
            if (tabName === 'reports') {
                displayReports();
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
